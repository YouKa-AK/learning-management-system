<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Announcement</title>

<style>

/* ===== GLOBAL ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* ===== BACKGROUND ===== */
body {
    min-height: 100vh;

    background:
        linear-gradient(rgba(15,118,110,0.75), rgba(14,165,164,0.75)),
        url("/static/images/college.jpg");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    display: flex;
    flex-direction: column;
    align-items: center;
}

/* ===== NAVBAR ===== */
.navbar {
    width: 100%;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(8px);
    padding: 15px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: white;
}

.nav-left {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo {
    width: 35px;
    height: 35px;
}

.nav-title {
    font-weight: 600;
    font-size: 18px;
}

.logout-btn {
    background: white;
    color: #0f766e;
    padding: 6px 14px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 500;
}

.logout-btn:hover {
    background: #e6e6e6;
}

/* ===== CONTAINER ===== */
.container {
    margin-top: 60px;
    background: rgba(255,255,255,0.95);
    padding: 30px 40px;
    border-radius: 16px;
    width: 450px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

/* ===== TITLE ===== */
h2 {
    text-align: center;
    color: #0f766e;
    margin-bottom: 10px;
}

.course-name {
    text-align: center;
    font-size: 14px;
    color: gray;
    margin-bottom: 20px;
}

/* ===== FORM ===== */
label {
    font-weight: 600;
    display: block;
    margin-bottom: 5px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    margin-bottom: 15px;
    font-size: 14px;
}

input:focus, textarea:focus {
    outline: none;
    border-color: #0ea5a4;
}

/* ===== BUTTONS ===== */
.btn-group {
    display: flex;
    gap: 10px;
}

.btn {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    color: white;
}

.submit-btn {
    background: linear-gradient(to right, #0f766e, #1fa39a);
}

.cancel-btn {
    background: #dc2626;
}

.btn:hover {
    opacity: 0.9;
}

</style>
</head>

<body>

<!-- ===== NAVBAR ===== -->
<div class="navbar">
    <div class="nav-left">
        <img src="{{ url_for('static', filename='images/logo.jpg') }}" class="logo">
        <span class="nav-title">Create Announcement</span>
    </div>

    <a href="/logout" class="logout-btn">Logout</a>
</div>

<!-- ===== FORM ===== -->
<div class="container">

    <h2>Create Announcement</h2>
    <div class="course-name">{{ course.course_name }}</div>

    <form method="POST">

        <label>Title</label>
        <input type="text" name="title" required>

        <label>Content</label>
        <textarea name="content" rows="6" required></textarea>

        <div class="btn-group">
            <button type="submit" class="btn submit-btn">Post</button>

            <a href="/view_announcements/{{ course_id }}" class="btn cancel-btn">
                Cancel
            </a>
        </div>

    </form>

</div>

</body>
</html>
