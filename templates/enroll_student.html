<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enroll Students</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1e8c82, #1fa39a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #f2f2f2;
            padding: 30px 40px;
            border-radius: 15px;
            width: 400px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            color: #0f766e;
            margin-bottom: 20px;
        }

        h3 {
            text-align: left;
            color: #333;
        }

        .class-list {
            text-align: left;
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
        }

        .class-item {
            background: white;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #ddd;
        }

        .class-item:hover {
            background: #e6f7f5;
        }

        input[type="checkbox"] {
            margin-right: 10px;
            transform: scale(1.2);
        }

        .btn {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, #0f766e, #1fa39a);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .back-link {
            display: block;
            margin-top: 15px;
            color: #0f766e;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>

<div class="container">

    <h2>Enroll Students</h2>
    <p><strong>{{ course_name }}</strong></p>

    <form method="POST" action="/enroll_class/{{ course_id }}">

        <h3>Select Classes</h3>

        <div class="class-list">
            {% for cls in classes %}
                <label class="class-item">
                    <div>
                        <input type="checkbox" name="classes[]" value="{{ cls.class }}">
                        {{ cls.class }}
                    </div>
                    <small>{{ cls.total_students }} students</small>
                </label>
            {% endfor %}
        </div>

        <button type="submit" class="btn">Enroll Selected Classes</button>

    </form>

    <a href="/view_my_courses" class="back-link">← Back to My Courses</a>

</div>

</body>
</html>
