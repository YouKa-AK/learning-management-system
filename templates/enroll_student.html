<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Enroll Students</title>

<style>

/* ===== GLOBAL ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* ===== BACKGROUND ===== */
body {
    min-height: 100vh;

    background:
        linear-gradient(rgba(15,118,110,0.75), rgba(14,165,164,0.75)),
        url("/static/images/college.jpg");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    display: flex;
    flex-direction: column;
    align-items: center;
}

/* ===== NAVBAR ===== */
.navbar {
    width: 100%;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(8px);
    padding: 15px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: white;
}

.nav-left {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo {
    width: 35px;
    height: 35px;
}

.nav-title {
    font-size: 18px;
    font-weight: 600;
}

.logout-btn {
    background: white;
    color: #0f766e;
    padding: 6px 14px;
    border-radius: 8px;
    text-decoration: none;
}

.logout-btn:hover {
    background: #e6e6e6;
}

/* ===== CONTAINER ===== */
.container {
    margin-top: 50px;
    background: rgba(255,255,255,0.95);
    padding: 30px 40px;
    border-radius: 16px;
    width: 420px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.25);
    text-align: center;
}

/* ===== TITLES ===== */
h2 {
    color: #0f766e;
    margin-bottom: 10px;
}

.course-name {
    color: gray;
    margin-bottom: 15px;
}

h3 {
    text-align: left;
    color: #333;
    margin-top: 10px;
}

/* ===== CLASS LIST ===== */
.class-list {
    text-align: left;
    margin-top: 15px;
    max-height: 220px;
    overflow-y: auto;
}

/* ITEM */
.class-item {
    background: #f9fafb;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid #ddd;
    transition: 0.2s;
}

.class-item:hover {
    background: #e6f7f5;
}

input[type="checkbox"] {
    margin-right: 10px;
    transform: scale(1.2);
}

/* ===== BUTTON ===== */
.btn {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    background: linear-gradient(to right, #0f766e, #1fa39a);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
}

.btn:hover {
    opacity: 0.9;
}

/* ===== BACK ===== */
.back-link {
    display: block;
    margin-top: 15px;
    color: #0f766e;
    text-decoration: none;
    font-size: 14px;
}

.back-link:hover {
    text-decoration: underline;
}

</style>
</head>

<body>

<!-- ===== NAVBAR ===== -->
<div class="navbar">
    <div class="nav-left">
        <img src="{{ url_for('static', filename='images/logo.jpg') }}" class="logo">
        <span class="nav-title">Enroll Students</span>
    </div>

    <a href="/logout" class="logout-btn">Logout</a>
</div>

<!-- ===== CONTENT ===== -->
<div class="container">

    <h2>Enroll Students</h2>
    <div class="course-name">{{ course_name }}</div>

    <form method="POST" action="/enroll_class/{{ course_id }}">

        <h3>Select Classes</h3>

        <div class="class-list">
            {% for cls in classes %}
                <label class="class-item">
                    <div>
                        <input type="checkbox" name="classes[]" value="{{ cls.class }}">
                        {{ cls.class }}
                    </div>
                    <small>{{ cls.total_students }} students</small>
                </label>
            {% endfor %}
        </div>

        <button type="submit" class="btn">
            Enroll Selected Classes
        </button>

    </form>

    <a href="/view_my_courses" class="back-link">
        ← Back to My Courses
    </a>

</div>

</body>
</html>
