<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teacher Registration</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== GLOBAL ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* ===== BACKGROUND ===== */
body {
    min-height: 100vh;

    background:
        linear-gradient(rgba(15,118,110,0.75), rgba(14,165,164,0.75)),
        url("/static/images/college.jpg");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    display: flex;
    flex-direction: column;
    align-items: center;
    color: white;
}

/* ===== BRANDING ===== */
.branding {
    margin-top: 4rem;
    text-align: center;
}

.branding img {
    width: 80px;
    margin-bottom: 1rem;
}

.branding h1 {
    font-size: 2.2rem;
    letter-spacing: 1.5px;
}

.branding p {
    margin-top: 0.5rem;
    opacity: 0.9;
}

/* ===== CARD ===== */
.login-card {
    margin-top: 3rem;
    background: rgba(255,255,255,0.95);
    color: #000;
    width: 100%;
    max-width: 400px;
    padding: 2.5rem;
    border-radius: 18px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.25);
}

.login-card h3 {
    text-align: center;
    color: #0f766e;
    margin-bottom: 1.5rem;
}

/* INPUTS */
.login-card input {
    width: 100%;
    padding: 0.75rem;
    margin-bottom: 1rem;
    border-radius: 10px;
    border: 1px solid #ccc;
}

.login-card input:focus {
    outline: none;
    border-color: #0ea5a4;
}

/* BUTTON */
.login-card button {
    width: 100%;
    padding: 0.75rem;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #0f766e, #0ea5a4);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.login-card button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(14,165,164,0.4);
}

/* LOGIN LINK */
.register-text {
    margin-top: 1.2rem;
    text-align: center;
}

.register-text a {
    color: #0ea5a4;
    font-weight: 600;
    text-decoration: none;
}

.register-text a:hover {
    text-decoration: underline;
}

/* MOBILE */
@media (max-width: 600px) {
    .branding h1 {
        font-size: 1.8rem;
    }

    .login-card {
        margin: 2rem 1rem;
    }
}

</style>
</head>

<script>
function validateTeacherForm() {

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let empCode = document.getElementById("empCode").value.trim();
    let password = document.getElementById("password").value;
    let confirmPassword = document.getElementById("confirmPassword").value;

    let namePattern = /^[A-Za-z\s]+$/;
    if (!namePattern.test(name)) {
        alert("Enter valid name");
        return false;
    }

    let emailPattern = /^[a-zA-Z0-9._%+-]+@kristujayanti\.com$/;
    if (!emailPattern.test(email)) {
        alert("Use official email");
        return false;
    }

    if (empCode === "") {
        alert("Enter employee code");
        return false;
    }

    if (password.length < 6) {
        alert("Password too short");
        return false;
    }

    if (password !== confirmPassword) {
        alert("Passwords do not match");
        return false;
    }

    return true;
}
</script>

<body>

<div class="branding">
    <img src="{{ url_for('static', filename='images/logo.jpg') }}">
    <h1>KRISTU JAYANTI UNIVERSITY</h1>
    <p>Learning Management System</p>
</div>

<div class="login-card">
    <h3>Teacher Registration</h3>

    <form method="POST" action="{{ url_for('register') }}" onsubmit="return validateTeacherForm()">
        <input type="text" id="name" name="name" placeholder="Full Name" required>
        <input type="email" id="email" name="email" placeholder="Email ID" required>
        <input type="text" id="empCode" name="empCode" placeholder="Employee Code" required>
        <input type="password" id="password" name="password" placeholder="Password" required>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password" required>

        <button type="submit">Register</button>
    </form>

    <div class="register-text">
        Already have an account?
        <a href="/">Login Here</a>
    </div>
</div>

</body>
</html>
