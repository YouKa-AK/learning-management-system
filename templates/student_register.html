<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: linear-gradient(rgba(15,118,110,0.85), rgba(14,165,164,0.85));
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
            color: #0f766e;
        }

        input {
            width: 100%;
            padding: 0.7rem;
            margin-bottom: 1rem;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 0.7rem;
            background: #0f766e;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #0ea5a4;
        }

        .message {
            text-align: center;
            margin-bottom: 1rem;
            color: red;
        }

        .success {
            color: green;
        }

        .login-link {
            text-align: center;
            margin-top: 1rem;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Student Registration</h2>

    {% if message %}
        <div class="message {{ 'success' if status == 'success' else '' }}">
            {{ message }}
        </div>
    {% endif %}

    <form method="POST">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="text" name="class" placeholder="Class (e.g. MCA A)" required>
        <input type="text" name="roll_number" placeholder="Roll Number" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Register</button>
    </form>

    <div class="login-link">
        <a href="/">Back to Login</a>
    </div>
</div>

</body>
</html>
