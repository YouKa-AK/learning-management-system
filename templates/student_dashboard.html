<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LMS Student Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

    /* ===== RESET ===== */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    /* ===== BACKGROUND (IMAGE + OVERLAY) ===== */
    body {
        min-height: 100vh;

        background:
            linear-gradient(rgba(15,118,110,0.75), rgba(14,165,164,0.75)),
            url("/static/images/college.jpg");

        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;

        color: white;
    }

    /* ===== NAVBAR (GLASS EFFECT) ===== */
    .header {
        background: rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(10px);

        padding: 15px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .header h2 {
        font-weight: 600;
    }

    /* ===== LOGOUT BUTTON ===== */
    .logout-btn {
        background: white;
        padding: 8px 18px;
        border-radius: 8px;
        text-decoration: none;
        color: #0f766e;
        font-weight: 600;
        transition: 0.3s;
    }

    .logout-btn:hover {
        background: #d1d5db;
    }

    /* ===== WELCOME SECTION ===== */
    .welcome-section {
        padding: 60px 80px 30px;
    }

    .welcome-section h1 {
        font-size: 36px;
        margin-bottom: 10px;
    }

    .welcome-section p {
        font-size: 16px;
        color: #e5e7eb;
    }

    /* ===== CARD CONTAINER ===== */
    .card-container {
        display: flex;
        gap: 40px;
        padding: 20px 80px;
        flex-wrap: wrap;
        justify-content: center; 
    }

    
    .card {
        background: white;
        color: #000;

        flex: 1;
        min-width: 320px;
        padding: 40px;
        border-radius: 20px;
        text-align: center;

        box-shadow: 0 20px 40px rgba(0,0,0,0.25);

        transition: 0.3s;
    }

    .card:hover {
        transform: translateY(-5px);
    }

    /* TEXT FIX */
    .card h3 {
        color: #0f766e;
        margin-bottom: 15px;
    }

    .card p {
        margin-bottom: 20px;
        color: #555;
    }

    /* ===== BUTTON ===== */
    .card a {
        display: inline-block;
        padding: 10px 22px;

        background: linear-gradient(135deg, #0f766e, #0ea5a4);

        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 600;
        transition: 0.3s;
    }

    .card a:hover {
        transform: scale(1.05);
        box-shadow: 0 10px 20px rgba(14,165,164,0.4);
    }

    /* ===== FOOTER ===== */
    .footer {
        text-align: center;
        margin-top: 60px;
        padding-bottom: 20px;
        font-size: 14px;
        opacity: 0.9;
    }

</style>

</head>

<body>

<!-- Header -->
<div class="header">
    <h2>LMS Student Panel</h2>

    <div class="nav-right">
        <a href="/profile" class="logout-btn">Profile</a>
        <a href="{{ url_for('logout') }}" class="logout-btn">Logout</a>
    </div>
</div>

<!-- Welcome Section -->
<div class="welcome-section">
    <h1>Welcome, {{ student_name }} 👋</h1>
    <p>Access your enrolled courses and assignments here.</p>
</div>

<!-- Cards -->
<div class="card-container">

    <div class="card">
        <h3>View My Courses</h3>
        <p>Check the courses you are enrolled in.</p>
        <a href="{{ url_for('my_courses') }}">View</a>
    </div>

    <!-- <div class="card">
        <h3>View Assignments</h3>
        <p>Access assignments given by your teachers.</p>
        <a href="url_for('view_assignments', course_id=course.id)">Open</a>
    </div> -->

    

</div>

<!-- Footer -->
<div class="footer">
    © 2026 Learning Management System | Student Dashboard
</div>

</body>
</html>
