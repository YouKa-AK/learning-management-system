<!DOCTYPE html>
<html>
<head>
    <title>Manage Courses</title>
    <style>

    /* ===== GLOBAL ===== */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    /* ===== BACKGROUND ===== */
    body {
        min-height: 100vh;

        background:
            linear-gradient(rgba(15,118,110,0.75), rgba(14,165,164,0.75)),
            url("/static/images/college.jpg");

        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;

        color: white;
    }

    /* ===== NAVBAR ===== */
    .navbar {
        background: rgba(0,0,0,0.3);
        backdrop-filter: blur(8px);
        padding: 15px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .navbar a {
        color: white;
        text-decoration: none;
        font-weight: 500;
    }

    /* ===== MAIN CONTAINER ===== */
    .container {
        padding: 30px;
        max-width: 1100px;
        margin: auto;
    }

    /* ===== BACK BUTTON ===== */
    .back-btn {
        display: inline-block;
        margin-bottom: 20px;
        padding: 8px 14px;
        background: #0f766e;
        color: white;
        text-decoration: none;
        border-radius: 8px;
    }

    .back-btn:hover {
        background: #0ea5a4;
    }

    /* ===== SEARCH BAR ===== */
    form {
        margin-bottom: 25px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;

        background: rgba(255,255,255,0.95);
        padding: 15px;
        border-radius: 12px;
        color: black;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    input, select {
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    /* ===== BUTTONS ===== */
    button {
        padding: 10px 15px;
        background: linear-gradient(to right, #0f766e, #1fa39a);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
    }

    button:hover {
        opacity: 0.9;
    }

    .reset-btn {
        padding: 10px 15px;
        background: #64748b;
        color: white;
        text-decoration: none;
        border-radius: 8px;
    }

    /* ===== TABLE CONTAINER ===== */
    .table-box {
        background: rgba(255,255,255,0.95);
        color: black;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    /* ===== TABLE ===== */
    table {
        width: 100%;
        border-collapse: collapse;
    }

    th {
        background: #0f766e;
        color: white;
        padding: 12px;
    }

    td {
        padding: 12px;
        border-bottom: 1px solid #ddd;
        text-align: center;
    }

    tr:hover {
        background: #e2e8f0;   
        color: #000;  
        background: #f8fafc;
        transform: scale(1.01);
        transition: 0.2s;         
    }

    /* ===== DELETE BUTTON ===== */
    .btn-delete {
        padding: 6px 12px;
        background: #dc2626;
        color: white;
        border-radius: 6px;
        text-decoration: none;
        font-size: 13px;
    }

    .btn-delete:hover {
        background: #b91c1c;
    }

    /* ===== EMPTY STATE ===== */
    .empty {
        text-align: center;
        padding: 20px;
        color: gray;
    }

    </style>
</head>
<body>

<div class="navbar">
    <h2>Admin - Courses</h2>
    <a href="/admin_dashboard" style="color:white;">Dashboard</a>
</div>

<div class="container">

    <a href="/admin_dashboard" class="back-btn">← Back to Dashboard</a>

    <form method="GET" style="margin-bottom: 20px; display:flex; gap:10px;">

        <input type="text" name="search" placeholder="Search course name or code"
            value="{{ search }}"
            style="padding:10px; width:250px; border-radius:5px; border:1px solid #ccc;">

        <select name="teacher" style="padding:10px; border-radius:5px;">
            <option value="">All Teachers</option>
            {% for t in teachers %}
                <option value="{{ t.email }}"
                    {% if selected_teacher == t.email %}selected{% endif %}>
                    {{ t.name }}
                </option>
            {% endfor %}
        </select>

        <button type="submit"
            style="padding:10px 15px; background:#3498db; color:white; border:none; border-radius:5px;">
            Search
        </button>

        <a href="/admin/courses"
        style="padding:10px 15px; background:#95a5a6; color:white; text-decoration:none; border-radius:5px;">
        Reset
        </a>

    </form>

    <h2>All Courses</h2>

    <table>
        <tr>
            <th>ID</th>
            <th>Course Name</th>
            <th>Course Code</th>
            <th>Teacher</th>
            <th>Action</th>
        </tr>

        {% for course in courses %}
        <tr>
            <td>{{ course.id }}</td>
            <td>{{ course.course_name }}</td>
            <td>{{ course.course_code }}</td>
            <td>{{ course.teacher_name }}</td>
            <td>
                <a href="/admin/delete_course/{{ course.course_id }}"
                   class="btn-delete"
                   onclick="return confirm('Delete this course?')">
                   Delete
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
