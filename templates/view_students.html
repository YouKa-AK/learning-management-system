<!DOCTYPE html>
<html>
<head>
    <title>Enrolled Students</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            background:
                linear-gradient(rgba(15,118,110,0.85), rgba(14,165,164,0.85));
            color: white;
            padding: 2rem;
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            color: black;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #0f766e;
            color: white;
            padding: 12px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .delete-btn {
            padding: 6px 12px;
            background: #dc2626;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }

        .delete-btn:hover {
            background: #b91c1c;
        }

        .back-btn {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.6rem 1.2rem;
            background: #0f766e;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        .count {
            margin-bottom: 1rem;
            font-weight: bold;
        }

    </style>
</head>
<body>

<h1>Students Enrolled in {{ course_name }}</h1>

<div class="container">

    <div class="count">
        Total Students: {{ students|length }}
    </div>

    {% if students %}
    <table>
        <tr>
            <th>Student Email</th>
            <th>Remove</th>
        </tr>

        {% for student in students %}
        <tr>
            <td>{{ student.student_email }}</td>
            <td>
                <a href="/remove_student/{{ student.id }}/{{ course_id }}"
                   class="delete-btn">
                   Remove
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>
    {% else %}
        <p>No students enrolled yet.</p>
    {% endif %}

    <a href="/view_my_courses" class="back-btn">
        Back to My Courses
    </a>

</div>

</body>
</html>
