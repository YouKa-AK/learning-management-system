<!DOCTYPE html>
<html>
<head>
    <title>Enrolled Students</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

/* ===== GLOBAL ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* ===== BACKGROUND ===== */
body {
    min-height: 100vh;

    background:
        linear-gradient(rgba(15,118,110,0.75), rgba(14,165,164,0.75)),
        url("/static/images/college.jpg");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    color: white;
}

/* ===== NAVBAR ===== */
.navbar {
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(8px);
    padding: 15px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.nav-left {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo {
    width: 35px;
    height: 35px;
}

.nav-title {
    font-size: 18px;
    font-weight: 600;
}

.logout-btn {
    background: white;
    color: #0f766e;
    padding: 6px 14px;
    border-radius: 8px;
    text-decoration: none;
}

.logout-btn:hover {
    background: #e6e6e6;
}

/* ===== TITLE ===== */
h1 {
    text-align: center;
    margin: 20px 0;
}

/* ===== CONTAINER ===== */
.container {
    max-width: 800px;
    margin: auto;

    background: rgba(255,255,255,0.95);
    color: black;
    padding: 2rem;
    border-radius: 16px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

/* ===== COUNT ===== */
.count {
    margin-bottom: 1rem;
    font-weight: bold;
    color: #0f766e;
}

/* ===== TABLE ===== */
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #0f766e;
    color: white;
    padding: 12px;
}

td {
    padding: 12px;
    border-bottom: 1px solid #ddd;
}

tr:hover {
    background: #f1f5f9;
}

/* ===== BUTTON ===== */
.delete-btn {
    padding: 6px 12px;
    background: #dc2626;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    font-size: 13px;
}

.delete-btn:hover {
    background: #b91c1c;
}

/* ===== EMPTY ===== */
.empty {
    text-align: center;
    padding: 20px;
    color: gray;
}

/* ===== BACK ===== */
.back-btn {
    display: block;
    margin: 20px auto 0;
    padding: 10px 18px;
    background: #0f766e;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    text-align: center;
    width: fit-content;
}

.back-btn:hover {
    background: #0ea5a4;
}

    </style>
</head>

<body>

<!-- ===== NAVBAR ===== -->
<div class="navbar">
    <div class="nav-left">
        <img src="{{ url_for('static', filename='images/logo.jpg') }}" class="logo">
        <span class="nav-title">Enrolled Students</span>
    </div>

    <a href="/logout" class="logout-btn">Logout</a>
</div>

<h1>Students Enrolled in {{ course_name }}</h1>

<div class="container">

    <div class="count">
        Total Students: {{ students|length }}
    </div>

    {% if students %}
    <table>
        <tr>
            <th>Student Email</th>
            <th>Remove</th>
        </tr>

        {% for student in students %}
        <tr>
            <td>{{ student.student_email }}</td>
            <td>
                <a href="/remove_student/{{ student.id }}/{{ course_id }}"
                   onclick="return confirm('Remove this student?')"
                   class="delete-btn">
                   Remove
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>
    {% else %}
        <div class="empty">No students enrolled yet.</div>
    {% endif %}

    <a href="/view_my_courses" class="back-btn">
        ← Back to My Courses
    </a>

</div>

</body>
</html>
